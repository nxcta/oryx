services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: secubot
      POSTGRES_PASSWORD: secubot_dev
      POSTGRES_DB: secubot
    ports:
      - "5432:5432"
    volumes:
      - secubot_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secubot -d secubot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - secubot_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  secubot_pg:
  secubot_redis:
